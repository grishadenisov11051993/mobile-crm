<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умная CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 pb-24">
    <div class="p-4" id="app">
        <h1 class="text-2xl font-bold mb-6">Заказы</h1>
        
        <div class="bg-white p-4 rounded-xl shadow-md mb-6">
            <input id="custName" type="text" placeholder="Имя клиента" class="w-full mb-2 p-2 border rounded">
            <input id="custPrice" type="text" placeholder="Сумма (₽)" class="w-full mb-2 p-2 border rounded">
            <input id="custPhone" type="text" placeholder="Телефон (7999...)" class="w-full mb-4 p-2 border rounded">
            <button onclick="addOrder()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Добавить заказ</button>
        </div>

        <div id="ordersList" class="space-y-4">
            <p class="text-gray-500">Загрузка заказов...</p>
        </div>
    </div>

    <script>
        // ВСТАВЬ СВОИ ДАННЫЕ СЮДА:
        const SUPABASE_URL = https://vhzzrczbkvldjvdosozg.supabase.co;
        const SUPABASE_KEY = sb_publishable_-ivfAU5o4IO1gJkX-jgkSQ_RzV20mfJ;
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Функция загрузки данных
        async function loadOrders() {
            const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('ordersList');
            container.innerHTML = '';
            
            data.forEach(order => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                        <div class="flex justify-between mb-2">
                            <span class="text-gray-400 text-sm">№ ${order.id}</span>
                            <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">${order.status}</span>
                        </div>
                        <h2 class="font-bold text-lg">${order.customer_name}</h2>
                        <p class="text-blue-600 font-bold mb-3">${order.total_price} ₽</p>
                        <a href="https://wa.me/${order.phone}" class="block text-center bg-green-500 text-white py-2 rounded-lg text-sm">Написать в WhatsApp</a>
                    </div>
                `;
            });
        }

        // Функция добавления данных
        async function addOrder() {
            const name = document.getElementById('custName').value;
            const price = document.getElementById('custPrice').value;
            const phone = document.getElementById('custPhone').value;

            await supabase.from('orders').insert([{ customer_name: name, total_price: price, phone: phone }]);
            
            // Очищаем форму и обновляем список
            document.getElementById('custName').value = '';
            document.getElementById('custPrice').value = '';
            document.getElementById('custPhone').value = '';
            loadOrders();
        }

        loadOrders(); // Запускаем при открытии
    </script>
</body>
</html>
