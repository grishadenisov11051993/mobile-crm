<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Хорошие полы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .kanban-scroll::-webkit-scrollbar { height: 4px; }
        .kanban-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .column { min-width: 300px; width: 100%; }
        @media (min-width: 768px) {
            .kanban-scroll { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; overflow-x: visible; }
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans pb-20">
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl shadow-2xl hidden z-50 text-xs font-bold transition-all text-white"></div>

    <div class="p-4 max-w-7xl mx-auto">
        <header class="flex flex-col gap-4 mb-6 border-b border-gray-800 pb-6">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-black text-white tracking-tighter uppercase">Хорошие полы</h1>
                <button onclick="toggleForm()" class="bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center shadow-lg shadow-blue-900/40">+</button>
            </div>
            
            <div class="flex gap-2">
                <input id="searchInput" oninput="renderData()" type="text" placeholder="Поиск по клиенту..." class="flex-1 bg-gray-900 border border-gray-800 rounded-xl px-4 py-2 text-sm outline-none focus:border-blue-500 transition">
                <button onclick="toggleView()" id="viewBtn" class="bg-gray-800 border border-gray-700 px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition">Вид: Доска</button>
            </div>
        </header>

        <div id="formSection" class="hidden bg-gray-900 p-6 rounded-2xl mb-8 border border-gray-800">
            <input id="cName" type="text" placeholder="Имя клиента" class="w-full mb-3 p-3 bg-gray-950 border border-gray-800 rounded-xl text-white outline-none">
            <input id="cPrice" type="number" placeholder="Сумма (₽)" class="w-full mb-3 p-3 bg-gray-950 border border-gray-800 rounded-xl text-white outline-none">
            <input id="cPhone" type="tel" placeholder="79XXXXXXXXX" class="w-full mb-4 p-3 bg-gray-950 border border-gray-800 rounded-xl text-white outline-none">
            <input id="cFile" type="file" class="block w-full text-xs text-gray-500 mb-6">
            <button onclick="saveOrder()" id="saveBtn" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest transition">Создать заказ</button>
        </div>

        <div id="kanbanView" class="flex overflow-x-auto gap-4 pb-4 kanban-scroll snap-x">
            <div class="column shrink-0 snap-center">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4 ml-2">Новые — <span id="cnt-new">0</span></h3>
                <div id="col-new" class="space-y-4"></div>
            </div>
            <div class="column shrink-0 snap-center">
                <h3 class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em] mb-4 ml-2">В работе — <span id="cnt-work">0</span></h3>
                <div id="col-work" class="space-y-4"></div>
            </div>
            <div class="column shrink-0 snap-center">
                <h3 class="text-[10px] font-bold text-green-500 uppercase tracking-[0.2em] mb-4 ml-2">Готово — <span id="cnt-done">0</span></h3>
                <div id="col-done" class="space-y-4"></div>
            </div>
        </div>

        <div id="listView" class="hidden space-y-3">
            <div id="list-container" class="space-y-2"></div>
            <div id="totalSum" class="text-right p-4 text-gray-400 font-bold border-t border-gray-800 mt-4 text-sm uppercase"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vhzzrczbkvldjvdosozg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_-ivfAU5o4IO1gJkX-jgkSQ_RzV20mfJ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isKanban = localStorage.getItem('crm_view') !== 'list';
        let allOrders = [];

        function toggleView() {
            isKanban = !isKanban;
            localStorage.setItem('crm_view', isKanban ? 'kanban' : 'list');
            renderData();
        }

        function toggleForm() { document.getElementById('formSection').classList.toggle('hidden'); }

        async function loadData() {
            const { data, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            allOrders = data;
            renderData();
        }

        function renderData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allOrders.filter(o => o.customer_name.toLowerCase().includes(search));
            
            document.getElementById('kanbanView').classList.toggle('hidden', !isKanban);
            document.getElementById('listView').classList.toggle('hidden', isKanban);
            document.getElementById('viewBtn').innerText = isKanban ? 'Вид: Доска' : 'Вид: Список';

            const containers = { 'Новый': 'col-new', 'В работе': 'col-work', 'Завершен': 'col-done' };
            const counts = { 'Новый': 0, 'В работе': 0, 'Завершен': 0 };
            let total = 0;

            Object.values(containers).forEach(id => document.getElementById(id).innerHTML = '');
            document.getElementById('list-container').innerHTML = '';

            filtered.forEach(item => {
                const status = item.status || 'Новый';
                counts[status]++;
                total += Number(item.total_price || 0);

                const fileBtn = item.file_url ? `<a href="${item.file_url}" target="_blank" class="text-blue-500 text-[10px] font-bold">ФАЙЛ 📎</a>` : '';
                const nextSt = status === 'Новый' ? 'В работе' : (status === 'В работе' ? 'Завершен' : 'Архив');
                const btnTxt = status === 'Новый' ? 'В работу →' : (status === 'В работе' ? 'Готово ✔' : 'Ок');

                const cardHtml = `
                    <div class="bg-gray-900 border border-gray-800 p-4 rounded-2xl shadow-sm">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-white text-base">${item.customer_name}</h4>
                            <button onclick="changeStatus(${item.id}, '${nextSt}')" class="text-[9px] font-bold bg-gray-800 px-2 py-1 rounded text-gray-400 uppercase">${btnTxt}</button>
                        </div>
                        <div class="text-green-500 font-black text-lg mt-1">${item.total_price} ₽</div>
                        <div class="flex justify-between items-center mt-4">
                            ${fileBtn}
                            <div class="flex gap-4 items-center">
                                <a href="https://wa.me/${item.phone}" target="_blank" class="text-emerald-500 text-[10px] font-bold">WA</a>
                                <button onclick="delOrder(${item.id})" class="text-gray-700 text-[10px]">УДАЛИТЬ</button>
                            </div>
                        </div>
                    </div>
                `;

                if (isKanban) {
                    if (containers[status]) document.getElementById(containers[status]).innerHTML += cardHtml;
                } else {
                    document.getElementById('list-container').innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 p-3 rounded-xl flex items-center justify-between gap-4">
                            <div class="flex-1"><div class="text-xs font-bold">${item.customer_name}</div><div class="text-[10px] text-gray-5
