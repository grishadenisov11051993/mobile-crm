<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Канбан CRM | Хорошие полы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .kanban-column { min-width: 300px; max-width: 300px; }
        @media (max-width: 768px) { .kanban-column { min-width: 100%; } }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <div class="p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">ХОРОШИЕ ПОЛЫ <span class="text-white text-xs uppercase ml-2 opacity-50 font-normal">Kanban</span></h1>
            <button onclick="toggleForm()" class="bg-blue-600 p-2 rounded-full shadow-lg">+</button>
        </header>

        <div id="addForm" class="hidden bg-gray-900 p-4 rounded-2xl mb-6 border border-gray-800 shadow-2xl">
            <input id="custName" type="text" placeholder="Имя клиента" class="w-full mb-2 p-3 bg-gray-800 border-none rounded-xl text-white outline-none">
            <input id="custPrice" type="text" placeholder="Сумма" class="w-full mb-2 p-3 bg-gray-800 border-none rounded-xl text-white outline-none">
            <input id="custPhone" type="text" placeholder="Телефон" class="w-full mb-3 p-3 bg-gray-800 border-none rounded-xl text-white outline-none">
            <label class="block text-xs text-gray-500 mb-1 ml-1">Прикрепить фото/файл:</label>
            <input id="custFile" type="file" class="w-full mb-4 text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
            <button onclick="addOrder()" id="addBtn" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase">Создать заказ</button>
        </div>

        <div class="flex overflow-x-auto gap-4 pb-10 custom-scrollbar">
            <div class="kanban-column">
                <h3 class="flex justify-between mb-4 font-bold text-gray-400 px-2 uppercase text-xs tracking-widest">Новые <span id="count-new" class="bg-gray-800 px-2 rounded">0</span></h3>
                <div id="list-new" class="space-y-4"></div>
            </div>
            <div class="kanban-column">
                <h3 class="flex justify-between mb-4 font-bold text-blue-400 px-2 uppercase text-xs tracking-widest">В работе <span id="count-work" class="bg-gray-800 px-2 rounded">0</span></h3>
                <div id="list-work" class="space-y-4"></div>
            </div>
            <div class="kanban-column">
                <h3 class="flex justify-between mb-4 font-bold text-green-400 px-2 uppercase text-xs tracking-widest">Готово <span id="count-done" class="bg-gray-800 px-2 rounded">0</span></h3>
                <div id="list-done" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vhzzrczbkvldjvdosozg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_-ivfAU5o4IO1gJkX-jgkSQ_RzV20mfJ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleForm() { document.getElementById('addForm').classList.toggle('hidden'); }

        async function loadOrders() {
            const { data, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);

            const lists = { 'Новый': 'list-new', 'В работе': 'list-work', 'Завершен': 'list-done' };
            const counts = { 'Новый': 0, 'В работе': 0, 'Завершен': 0 };
            
            Object.values(lists).forEach(id => document.getElementById(id).innerHTML = '');

            data.forEach(order => {
                const listId = lists[order.status] || 'list-new';
                counts[order.status || 'Новый']++;
                
                const fileLink = order.file_url ? `<a href="${order.file_url}" target="_blank" class="block mt-2 text-[10px] text-blue-400 underline uppercase tracking-tighter">📎 Посмотреть файл</a>` : '';
                const nextStatus = order.status === 'Новый' ? 'В работе' : (order.status === 'В работе' ? 'Завершен' : 'Архив');

                document.getElementById(listId).innerHTML += `
                    <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-white">${order.customer_name}</h4>
                            <button onclick="updateStatus(${order.id}, '${nextStatus}')" class="text-[10px] bg-gray-800 p-1 px-2 rounded text-gray-400 hover:text-white">Next →</button>
                        </div>
                        <p class="text-green-500 font-black text-sm">${order.total_price} ₽</p>
                        ${fileLink}
                        <div class="flex justify-between items-center mt-4">
                            <a href="https://wa.me/${order.phone}" class="text-[10px] text-emerald-500 font-bold uppercase">WhatsApp</a>
                            <button onclick="deleteOrder(${order.id})" class="text-[10px] text-gray-700 hover:text-red-500">Удалить</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('count-new').innerText = counts['Новый'];
            document.getElementById('count-work').innerText = counts['В работе'];
            document.getElementById('count-done').innerText = counts['Завершен'];
        }

        async function addOrder() {
            const btn = document.getElementById('addBtn');
            const fileInput = document.getElementById('custFile');
            const file = fileInput.files[0];
            let fileUrl = null;

            btn.disabled = true; btn.innerText = "Загрузка...";

            if (file) {
                const fileName = `${Date.now()}-${file.name}`;
                const { data, error } = await _supabase.storage.from('order-files').upload(fileName, file);
                if (data) {
                    const { data: publicUrl } = _supabase.storage.from('order-files').getPublicUrl(fileName);
                    fileUrl = publicUrl.publicUrl;
                }
            }

            await _supabase.from('orders').insert([{ 
                customer_name: document.getElementById('custName').value,
                total_price: document.getElementById('custPrice').value,
                phone: document.getElementById('custPhone').value,
                file_url: fileUrl,
                status: 'Новый'
            }]);

            toggleForm();
            loadOrders();
            btn.disabled = false; btn.innerText = "Создать заказ";
        }

        async function updateStatus(id, st) { await _supabase.from('orders').update({ status: st }).eq('id', id); loadOrders(); }
        async function deleteOrder(id) { if(confirm("Удалить?")) { await _supabase.from('orders').delete().eq('id', id); loadOrders(); } }

        loadOrders();
    </script>
</body>
</html>
